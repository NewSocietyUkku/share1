<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Unicode Watch - List Controller</title>
    <style>
        body, html {
            background-color: #121212;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Watch Screen Styles */
        #watchScreen {
            display: flex; 
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
            background-color: #070a0f; 
            position: relative;
            transition: background-color 0.4s ease; 
        }

        /* Watch Case & Dial */
        .watch-case {
            width: 400px; 
            height: 440px;
            background: #121824; 
            border-radius: 80px; 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            border: 8px solid #2b394e; 
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: background 0.4s ease, border-color 0.4s ease; 
        }

        .dial {
            width: 90%;
            height: 88%;
            position: relative;
            pointer-events: none;
        }

        /* Complications */
        .comp {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .circle {
            width: 28px; 
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            background-color: #333; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: background-color 0.2s;
        }

        /* Positions */
        .tl { top: 18%; left: 10%; }
        .tr { top: 18%; right: 10%; }
        .br { bottom: 22%; right: 10%; }
        
        /* Bottom Left (Stacked) */
        .bl { 
            bottom: 20%; 
            left: 10%; 
            flex-direction: column; 
            gap: 5px;
        }
        .bl-row {
            display: flex;
            gap: 5px;
        }

        /* Analog Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            background: #fff;
            border-radius: 4px;
            z-index: 10;
        }

        .hour-hand { width: 8px; height: 80px; margin-left: -4px; background: #e0e0e0; }
        .minute-hand { width: 6px; height: 120px; margin-left: -3px; background: #ffffff; }
        .second-hand { width: 2px; height: 135px; margin-left: -1px; background: #ff3b30; z-index: 11; }

        /* Red Center Dot */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            background: #ff3b30;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 14;
            border: 4px solid #1e1e1e;
            cursor: pointer;
            pointer-events: auto !important;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .center-dot:hover {
            transform: translate(-50%, -50%) scale(1.15);
            background-color: #ff5c53;
        }

        .center-dot:active {
            transform: translate(-50%, -50%) scale(0.9);
            background-color: #cc2a22;
        }

        /* Simple dial markers */
        .marker {
            position: absolute;
            width: 3px;
            height: 15px;
            background: #555;
            left: 50%;
            margin-left: -1.5px;
            transform-origin: 50% 180px;
            top: 10px;
        }

        /* Peek Button */
        #modePeekBtn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #2b394e;
            border: 6px solid #5a739c;
            width: 100px;
            height: 100px;
            border-radius: 50%; 
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: background-color 0.2s, transform 0.2s;
        }

        #modePeekBtn:hover {
            background-color: #3b4e6a;
        }

        #modePeekBtn:active {
            transform: translateY(-50%) scale(0.90);
        }

        /* Peek Text Overlay */
        #textOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(7, 10, 15, 0.95);
            border: 2px solid #5a739c;
            padding: 30px 40px;
            border-radius: 12px;
            z-index: 50;
            display: none; 
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            pointer-events: none; 
            font-family: monospace;
            min-width: 150px;
        }

        .peek-context-row {
            color: #888;
            font-size: 22px;
            letter-spacing: 4px;
            min-height: 26px;
        }

        .peek-current-row {
            color: #ff3b30;
            font-size: 48px;
            font-weight: bold;
            border-top: 2px solid #333;
            border-bottom: 2px solid #333;
            padding: 10px 0;
            width: 100%;
            text-align: center;
            min-height: 55px;
        }

        .mode-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #5a739c;
            font-weight: bold;
            font-size: 24px;
            z-index: 100;
        }
    </style>
</head>

        // Build a full array of 999 entries, padded with "not applicable"
        const TOTAL_ENTRIES = 999;
        const words = new Array(TOTAL_ENTRIES).fill(null).map((_, idx) => {
            const num = idx + 1;
            const paddedNum = String(num).padStart(3, '0');
            return `${paddedNum} not applicable`;
        });

        // Overwrite with real entries where available
        originalEntries.forEach(entry => {
            // extract the leading number (e.g., "101" from "101 psi")
            const match = entry.match(/^(\d+)/);
            if (match) {
                const number = parseInt(match[1], 10);
                if (number >= 1 && number <= TOTAL_ENTRIES) {
                    words[number - 1] = entry;
                }
            }
        });

        // Rest of the script remains unchanged
        const digitColors = [
            { bg: '#111111', text: '#FFFFFF' }, { bg: '#8B4513', text: '#FFFFFF' },
            { bg: '#FF4136', text: '#FFFFFF' }, { bg: '#FF851B', text: '#000000' },
            { bg: '#FFDC00', text: '#000000' }, { bg: '#2ECC40', text: '#000000' },
            { bg: '#0074D9', text: '#FFFFFF' }, { bg: '#B10DC9', text: '#FFFFFF' },
            { bg: '#AAAAAA', text: '#000000' }, { bg: '#FFFFFF', text: '#000000' }
        ];

        const modes = [
            { step: 1,   bg: '#121824', border: '#2b394e', screen: '#070a0f', name: 'Mode 1: Advance by 1' },     
            { step: 10,  bg: '#1c1c1e', border: '#e5e5ea', screen: '#0b0b0c', name: 'Mode 2: Advance by 10' },    
            { step: 100, bg: '#231515', border: '#4a2525', screen: '#120808', name: 'Mode 3: Advance by 100' }    
        ];

        // State Variables
        let listIndex = 0;
        let charIndex = 0;
        let modeIndex = 0;

        function setCircle(id, digit, showText = false) {
            const el = document.getElementById(id);
            if (!el) return;
            if (digit >= 0 && digit <= 9) {
                el.innerText = showText ? digit : ''; 
                el.style.backgroundColor = digitColors[digit].bg;
                el.style.color = digitColors[digit].text;
            } else {
                el.innerText = showText ? '-' : '';
                el.style.backgroundColor = '#333';
                el.style.color = '#fff';
            }
        }

        function updateDisplay() {
            const currentText = words[listIndex];
            const len = currentText.length;

            // Enforce purely circular navigation within the current word
            charIndex = ((charIndex % len) + len) % len;

            const currChar = currentText[charIndex];
            const prevChar = currentText[(charIndex - 1 + len) % len];
            const nextChar = currentText[(charIndex + 1) % len];

            const currUni = currChar.codePointAt(0).toString().padStart(3, '0');
            const prevUni = prevChar.codePointAt(0).toString().padStart(3, '0');
            const nextUni = nextChar.codePointAt(0).toString().padStart(3, '0');

            // Current (Top Right)
            setCircle('circ-tr1', parseInt(currUni[0]));
            setCircle('circ-tr2', parseInt(currUni[1]));
            setCircle('circ-tr3', parseInt(currUni[2]));

            // Prev (Top Left)
            setCircle('circ-tl1', parseInt(prevUni[0]));
            setCircle('circ-tl2', parseInt(prevUni[1]));
            setCircle('circ-tl3', parseInt(prevUni[2]));

            // Next (Bottom Right)
            setCircle('circ-br1', parseInt(nextUni[0]));
            setCircle('circ-br2', parseInt(nextUni[1]));
            setCircle('circ-br3', parseInt(nextUni[2]));

            // List Index Position (Bottom Left - Top Row) -> 1-based index of current word (NOW 3 DIGITS)
            let listNumStr = (listIndex + 1).toString().padStart(3, '0');
            if (listNumStr.length > 3) listNumStr = listNumStr.slice(-3);
            setCircle('circ-bl-list0', parseInt(listNumStr[0]));
            setCircle('circ-bl-list1', parseInt(listNumStr[1]));
            setCircle('circ-bl-list2', parseInt(listNumStr[2]));

            // Character Index Position (Bottom Left - Bottom Row) -> 1-based index of current character (NOW 3 DIGITS)
            let charNumStr = (charIndex + 1).toString().padStart(3, '0');
            if (charNumStr.length > 3) charNumStr = charNumStr.slice(-3);
            setCircle('circ-bl0', parseInt(charNumStr[0]));
            setCircle('circ-bl1', parseInt(charNumStr[1]));
            setCircle('circ-bl2', parseInt(charNumStr[2]));
        }

        function changeList(direction) {
            // Apply the mode's step size (1, 10, or 100) to the list jumps
            const step = modes[modeIndex].step;
            const delta = direction * step;
            
            listIndex = ((listIndex + delta % words.length) + words.length) % words.length;
            charIndex = 0; // Reset character position when changing list words
            updateDisplay();
        }

        function jumpSequence(direction) {
            // Always advance the character index by exactly 1, ignoring the mode step
            charIndex += direction;
            updateDisplay();
        }

        function toggleMode() {
            modeIndex = (modeIndex + 1) % modes.length;
            const currentMode = modes[modeIndex];
            
            document.getElementById('watchScreen').style.backgroundColor = currentMode.screen;
            document.getElementById('watchCase').style.background = currentMode.bg;
            document.getElementById('watchCase').style.borderColor = currentMode.border;
            document.getElementById('modeIndicator').innerText = currentMode.name;

            // Trigger the peek text overlay automatically
            triggerPeekText();
        }

        // Context Peek Logic
        let peekTimeoutId = null;
        function triggerPeekText(e) {
            if (e) e.stopPropagation(); 
            const currentText = words[listIndex];
            const charArray = Array.from(currentText);
            
            let prevChars = "";
            let startIndex = Math.max(0, charIndex - 8);
            for (let i = startIndex; i < charIndex; i++) {
                prevChars += charArray[i] === ' ' ? '&nbsp;' : charArray[i];
            }

            let currChar = charArray[charIndex] === ' ' ? '&nbsp;' : charArray[charIndex];

            let nextChars = "";
            let endIndex = Math.min(charArray.length - 1, charIndex + 8);
            for (let i = charIndex + 1; i <= endIndex; i++) {
                nextChars += charArray[i] === ' ' ? '&nbsp;' : charArray[i];
            }

            let displayHTML = `
                <div class="peek-context-row">${prevChars || '&nbsp;'}</div>
                <div class="peek-current-row">${currChar}</div>
                <div class="peek-context-row">${nextChars || '&nbsp;'}</div>
            `;

            const overlay = document.getElementById('textOverlay');
            overlay.innerHTML = displayHTML;
            overlay.style.display = 'flex';

            if (peekTimeoutId) clearTimeout(peekTimeoutId);
            
            peekTimeoutId = setTimeout(() => {
                overlay.style.display = 'none';
            }, 2000);
        }

        function toggleFullScreen() {
            const el = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (el.requestFullscreen) {
                    el.requestFullscreen().catch(err => console.log(err));
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // Attach fullscreen directly to center-dot with both click and touch
        document.addEventListener('DOMContentLoaded', () => {
            const dot = document.querySelector('.center-dot');
            if (dot) {
                dot.addEventListener('click', (e) => { e.stopPropagation(); toggleFullScreen(); });
                dot.addEventListener('touchend', (e) => { e.stopPropagation(); e.preventDefault(); toggleFullScreen(); });
            }
        });

        // --- Event Listeners ---

        const watchScreen = document.getElementById('watchScreen');
        
        // Left Click / Single Tap to advance forward
        watchScreen.addEventListener('click', (e) => {
            if (e.target.classList.contains('center-dot') || e.target.closest('#modePeekBtn')) return; 
            jumpSequence(1); 
        });

        // Right Click to move backwards
        watchScreen.addEventListener('contextmenu', (e) => {
            if (e.target.classList.contains('center-dot') || e.target.closest('#modePeekBtn')) return; 
            e.preventDefault(); // Prevents the browser menu from showing up
            jumpSequence(-1); 
        });

        // Mouse Wheel changes the list item
        let lastScrollTime = 0;
        watchScreen.addEventListener('wheel', (e) => {
            const currentTime = new Date().getTime();
            if (currentTime - lastScrollTime < 150) return; 

            if (e.deltaY < 0) {
                changeList(-1); // Up
            } else if (e.deltaY > 0) {
                changeList(1); // Down
            }
            lastScrollTime = currentTime;
        }, { passive: true });

        // Touch interactions
        let touchStartX = 0;
        let touchStartY = 0;

        watchScreen.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        watchScreen.addEventListener('touchend', (e) => {
            if (e.target.closest('#modePeekBtn') || e.target.classList.contains('center-dot')) return; 

            let touchEndX = e.changedTouches[0].clientX;
            let touchEndY = e.changedTouches[0].clientY;
            
            let deltaX = touchEndX - touchStartX;
            let deltaY = touchEndY - touchStartY;
            
            // Swipe X-axis: Change Step Size Mode
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 40) {
                toggleMode(); 
            } 
            // Swipe Y-axis: Switch List items
            else if (Math.abs(deltaY) > 30) {
                if (deltaY < -30) {
                    changeList(1); 
                } else if (deltaY > 30) {
                    changeList(-1); 
                }
            }
        }, { passive: true });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                toggleMode();
            }
            if (e.key === 'ArrowUp') {
                changeList(-1);
            }
            if (e.key === 'ArrowDown') {
                changeList(1);
            }
        });

        // Random number display — fades to a new 3-digit number every 1.5 minutes
        function randomThreeDigit() {
            return String(Math.floor(Math.random() * 900) + 100); // 100–999
        }

        function cycleRandomNumber() {
            const el = document.getElementById('randomNumber');
            el.style.opacity = '0';
            setTimeout(() => {
                el.textContent = randomThreeDigit();
                el.style.opacity = '1';
            }, 1000); // wait for fade-out, then show new number
        }

        // Init
        window.onload = () => {
            updateDisplay();
            // Set initial random number and start cycle
            const el = document.getElementById('randomNumber');
            el.textContent = randomThreeDigit();
            setInterval(cycleRandomNumber, 90000); // every 1.5 minutes
        };

    </script>
</body>
</html>
